<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunicaciones ATC · Fuerza Aérea</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @page {
      size: A4;
      margin: 0;
    }

    body {
      background-color: #2c3e4e;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .manual {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background: #f5f7fc;
      position: relative;
      padding: 12mm 12mm 12mm 12mm;
      display: flex;
      flex-direction: column;
      page-break-after: always;
      break-inside: avoid;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.02"><path fill="%23336699" d="M50 15 L70 35 L65 55 L50 70 L35 55 L30 35 Z M50 30 L60 40 L55 55 L50 62 L45 55 L40 40 Z" /></svg>');
      background-repeat: repeat;
      background-size: 60px 60px;
    }

    @media print {
      body {
        background: white;
      }
      .page {
        box-shadow: none;
        border: none;
        background-image: none;
      }
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5mm;
      border-bottom: 2px solid #c4a747;
      padding-bottom: 3mm;
      flex-shrink: 0;
    }
    .logo-airforce {
      height: 45px;
      width: auto;
    }
    .header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 16pt;
      color: #1f6392;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .page-content {
      flex: 1 0 auto;
      overflow: visible;
    }

    .page-footer {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 6mm;
      border-top: 1px dashed #c4a747;
      padding-top: 3mm;
      font-family: 'Oswald', sans-serif;
      color: #5a7d9a;
      font-size: 10pt;
    }
    .footer-note {
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .page-number {
      font-weight: 700;
      color: #1f6392;
    }

    .section-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 28pt;
      text-transform: uppercase;
      color: #1f4b6e;
      border-left: 10px solid #c4a747;
      padding-left: 12px;
      margin: 5mm 0 5mm 0;
      border-bottom: 2px solid #c4a747;
      padding-bottom: 3px;
    }

    .subsection-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 18pt;
      color: #1f6392;
      margin: 3mm 0 2mm 0;
      border-left: 5px solid #c4a747;
      padding-left: 10px;
    }

    .text-block {
      background: white;
      border-radius: 12px;
      padding: 3mm 4mm;
      margin-bottom: 4mm;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      border: 1px solid #e2ecf5;
    }

    .info-label {
      font-size: 10pt;
      font-weight: 700;
      text-transform: uppercase;
      color: #2c7aa0;
      letter-spacing: 0.5px;
      margin-bottom: 2mm;
      display: block;
    }

    .info-text {
      font-size: 11pt;
      line-height: 1.4;
      color: #1f3e54;
      text-align: justify;
    }

    .highlight-box {
      background: #fefcf5;
      border-left: 4px solid #c4a747;
      padding: 2.5mm 3mm;
      margin: 3mm 0;
      border-radius: 8px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2.5mm;
      margin: 2mm 0;
    }

    .abbrev-card {
      background: white;
      border-radius: 10px;
      padding: 1.5mm 3mm;
      border: 1px solid #e0eaf3;
      font-family: monospace;
      font-size: 10pt;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .abbrev-term {
      font-weight: 800;
      color: #1f6392;
      background: #eef3fa;
      display: inline-block;
      padding: 1px 6px;
      border-radius: 20px;
      margin-right: 6px;
      font-size: 10pt;
    }
    .abbrev-desc {
      color: #2c5a7a;
    }

    .example-comm {
      background: #eef3fa;
      padding: 2.5mm;
      border-radius: 10px;
      margin: 2.5mm 0;
      font-family: monospace;
      font-size: 10.5pt;
      border-left: 4px solid #c4a747;
    }

    .golden-rule {
      background: #fff8e7;
      border: 2px solid #c4a747;
      border-radius: 20px;
      padding: 5mm 6mm;
      text-align: center;
      margin: 5mm 0;
    }
    .golden-rule h3 {
      font-family: 'Oswald', sans-serif;
      font-size: 22pt;
      color: #1f4b6e;
      margin-bottom: 3mm;
    }
    .golden-rule p {
      font-size: 13pt;
      font-style: italic;
      color: #2c5a7a;
    }

    .cover-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12mm;
      margin: 12mm 0 10mm;
    }
    .cover-title {
      text-align: center;
      margin-top: 15mm;
    }
    .cover-title h1 {
      font-family: Oswald;
      font-size: 48pt;
      margin: 4mm 0;
      color: #1f4b6e;
    }
    .cover-title h2 {
      font-family: Oswald;
      font-weight: 500;
      font-size: 32pt;
      color: #c4a747;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="manual">
  <!-- PORTADA (página 1) -->
  <div class="page">
    <div class="cover-logos">
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force Emblem">
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force Emblem">
    </div>
    <div class="page-content">
      <div class="cover-title">
        <h1>COMUNICACIONES</h1>
        <h2>AIR FORCE</h2>
        <div style="height: 2px; background: #c4a747; width: 60%; margin: 6mm auto;"></div>
        <p style="font-size: 15pt; margin-top: 8mm;"><span style="background: #1f4b6e; color: white; padding: 4px 16px; border-radius: 40px;">ATC · PROCEDIMIENTOS OFICIALES</span></p>
        <p style="font-size: 13pt; margin-top: 10mm;">Control de Tráfico Aéreo • Abreviaturas Tácticas • Protocolo Fonético</p>
      </div>
    </div>
    <div class="page-footer">
      <span class="footer-note">Fuerza Aérea · Alto Mando</span>
      <span class="page-number">1</span>
    </div>
  </div>

  <div id="dynamic-pages"></div>
</div>

<script>
  // Lista completa de abreviaturas
  const allAbbreviations = [
    { term: "AA", desc: "Air-to-Air (Aire-Aire)" }, { term: "AB", desc: "Air Base (Base Aérea)" }, { term: "AD", desc: "Air Defense (Defensa Aérea)" }, { term: "AG", desc: "Air-to-Ground (Aire-Tierra)" }, { term: "AO", desc: "Area of Operations (Área de Operaciones)" }, { term: "AP", desc: "Armor Piercing (Perforante de Blindaje)" }, { term: "AT", desc: "Anti-Tank (Anti-Tanque)" },
    { term: "BB", desc: "Blue Forces (Fuerzas Azules/Aliados)" }, { term: "BD", desc: "Battle Damage (Daño de Combate)" }, { term: "BF", desc: "Friendly Forces (Fuerzas Amigas)" }, { term: "BR", desc: "Briefing (Instrucciones)" },
    { term: "CA", desc: "Close Air (Apoyo Aéreo Cercano)" }, { term: "CB", desc: "Counter-Battery (Contrabatería)" }, { term: "CI", desc: "Combat Ineffective (Baja de Combate)" }, { term: "CP", desc: "Command Post (Puesto de Mando)" }, { term: "CT", desc: "Counter-Terrorism (Contraterrorismo)" },
    { term: "DC", desc: "Disengage (Romper Contacto)" }, { term: "DD", desc: "Direct Damage (Daño Directo)" }, { term: "DE", desc: "Defensive Emission (Emisión Defensiva)" }, { term: "DT", desc: "Drop Target (Objetivo de Lanzamiento)" }, { term: "DZ", desc: "Drop Zone (Zona de Lanzamiento)" },
    { term: "EA", desc: "Emergency Alert (Alerta de Emergencia)" }, { term: "EC", desc: "Electronic Combat (Combate Electrónico)" }, { term: "EM", desc: "Emergency (Emergencia)" }, { term: "ENF", desc: "Enemy Fire (Fuego Enemigo)" }, { term: "EO", desc: "Electro-Optical (Electro-Óptico)" },
    { term: "FC", desc: "Fire Control (Control de Fuego)" }, { term: "FL", desc: "Forward Line (Línea Frontal)" }, { term: "FP", desc: "Friendly Position (Posición Aliada)" }, { term: "FR", desc: "Fire Request (Solicitud de Fuego)" },
    { term: "GC", desc: "Ground Control (Control de Tierra)" }, { term: "GP", desc: "Guided Projectile (Proyectil Guiado)" }, { term: "GT", desc: "Ground Target (Objetivo Terrestre)" },
    { term: "HA", desc: "High Altitude (Alta Altitud)" }, { term: "HD", desc: "Hostile Detected (Hostil Detectado)" }, { term: "HP", desc: "High Priority (Alta Prioridad)" },
    { term: "IC", desc: "Intercept (Interceptar)" }, { term: "ID", desc: "Identify (Identificar)" }, { term: "IF", desc: "Indirect Fire (Fuego Indirecto)" }, { term: "IM", desc: "Immediate (Inmediato)" }, { term: "IMI", desc: "Imminent Impact (Impacto Inminente)" },
    { term: "JA", desc: "Jet Attack (Ataque de Jet)" }, { term: "JS", desc: "Joint Strike (Ataque Conjunto)" },
    { term: "KA", desc: "Kill Approved (Baja Autorizada)" }, { term: "KT", desc: "Kill Target (Objetivo a Eliminar)" },
    { term: "LA", desc: "Low Altitude (Baja Altitud)" }, { term: "LZ", desc: "Landing Zone (Zona de Aterrizaje)" },
    { term: "MA", desc: "Mission Abort (Misión Abortada)" }, { term: "MC", desc: "Mission Complete (Misión Cumplida)" }, { term: "MCF", desc: "Mechanical Failure (Falla Mecánica)" }, { term: "MT", desc: "Moving Target (Objetivo en Movimiento)" },
    { term: "NA", desc: "Not Authorized (No Autorizado)" }, { term: "NC", desc: "No Contact (Sin Contacto)" }, { term: "NF", desc: "No Fly (Zona de Exclusión Aérea)" }, { term: "NP", desc: "No Permission (Sin Permiso)" }, { term: "NT", desc: "No Threat (Sin Amenaza)" },
    { term: "OB", desc: "Order of Battle (Orden de Batalla)" }, { term: "OP", desc: "Observation Post (Puesto de Observación)" }, { term: "OR", desc: "Operational Ready (Listo para Operar)" },
    { term: "PA", desc: "Position Alert (Alerta de Posición)" }, { term: "PC", desc: "Patrol Course (Ruta de Patrulla)" }, { term: "PL", desc: "Patrol Leader (Líder de Patrulla)" }, { term: "PR", desc: "Priority (Prioridad)" }, { term: "PT", desc: "Primary Target (Objetivo Principal)" },
    { term: "QA", desc: "Quick Action (Acción Rápida)" }, { term: "QR", desc: "Quick Reaction (Reacción Rápida)" }, { term: "QT", desc: "Quiet (Silencio de Radio)" },
    { term: "RC", desc: "Radio Check (Chequeo de Radio)" }, { term: "RD", desc: "Radar Detected (Detectado por Radar)" }, { term: "RF", desc: "Request Fire (Solicitar Fuego)" }, { term: "RP", desc: "Rally Point (Punto de Reunión)" }, { term: "RT", desc: "Return to Base (Regresar a Base)" },
    { term: "SA", desc: "Situation Awareness (Conciencia Situacional)" }, { term: "SC", desc: "Secure (Asegurado)" }, { term: "SD", desc: "Self-Destruct (Autodestrucción)" }, { term: "SF", desc: "Support Fire (Fuego de Apoyo)" }, { term: "SM", desc: "Suppressive Fire (Fuego de Supresión)" }, { term: "SR", desc: "Search and Rescue (Búsqueda y Rescate)" }, { term: "ST", desc: "Standby (En Espera)" },
    { term: "TA", desc: "Target Acquired (Objetivo Adquirido)" }, { term: "TC", desc: "Tactical Command (Mando Táctico)" }, { term: "TD", desc: "Target Destroyed (Objetivo Destruido)" }, { term: "TG", desc: "Target (Objetivo)" }, { term: "TR", desc: "Track (Seguir)" }, { term: "TS", desc: "Tactical Strike (Ataque Táctico)" }, { term: "TT", desc: "Time Target (Tiempo sobre Objetivo)" }, { term: "TWR", desc: "Control Tower (Torre de Control)" },
    { term: "UC", desc: "Under Cover (Encubierto)" }, { term: "UD", desc: "Under Fire (Bajo Fuego)" }, { term: "UID", desc: "Unidentified Subject (Sujeto No Identificado)" }, { term: "UR", desc: "Urgent (Urgente)" }, { term: "US", desc: "Unsecured (Inseguro)" },
    { term: "VC", desc: "Visual Contact (Contacto Visual)" }, { term: "VD", desc: "Vehicle Disabled (Vehículo Inutilizado)" }, { term: "VP", desc: "Vulnerable Point (Punto Vulnerable)" }, { term: "VT", desc: "Vertical Takeoff (Despegue Vertical)" },
    { term: "WA", desc: "Weapons Armed (Armas Activadas)" }, { term: "WC", desc: "Weapons Clear (Armas Libres)" }, { term: "WD", desc: "Weapons Dry (Sin Munición)" }, { term: "WP", desc: "Waypoint (Punto de Referencia)" }, { term: "WT", desc: "Weapons Tight (Fuego Restringido)" },
    { term: "XA", desc: "Execute Attack (Ejecutar Ataque)" }, { term: "XD", desc: "Execute Defense (Ejecutar Defensa)" },
    { term: "YA", desc: "Your Approval (Su Aprobación)" }, { term: "YC", desc: "Your Command (Su Orden)" },
    { term: "ZA", desc: "Zone Secure (Zona Asegurada)" }, { term: "ZD", desc: "Zone Dangerous (Zona Peligrosa)" }, { term: "ZF", desc: "Zone Free (Zona Libre)" }
  ];

  // Dividir abreviaturas en 5 partes equilibradas
  const total = allAbbreviations.length;
  const partSize = Math.ceil(total / 5);
  const abbrParts = [
    allAbbreviations.slice(0, partSize),
    allAbbreviations.slice(partSize, partSize*2),
    allAbbreviations.slice(partSize*2, partSize*3),
    allAbbreviations.slice(partSize*3, partSize*4),
    allAbbreviations.slice(partSize*4)
  ];

  function renderAbbrevPage(title, abbrevList, pageNum) {
    let itemsHtml = '';
    abbrevList.forEach(ab => {
      itemsHtml += `
        <div class="abbrev-card">
          <span class="abbrev-term">${ab.term}</span>
          <span class="abbrev-desc">${ab.desc}</span>
        </div>
      `;
    });
    return `
      <div class="page-header">
        <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce">
        <span class="header-title">ATC · Abreviaturas Tácticas</span>
        <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce" style="opacity:0.8;">
      </div>
      <div class="page-content">
        <div class="section-title">${title}</div>
        <div class="grid-two">
          ${itemsHtml}
        </div>
        <div class="highlight-box" style="margin-top: 2mm;">
          <span class="info-label">📢 USO EN RADIO</span>
          <div class="info-text">Estas abreviaturas permiten transmisiones rápidas y precisas. Combinar con alfabeto fonético (Alpha, Bravo, etc.) para mayor claridad.</div>
        </div>
      </div>
      <div class="page-footer">
        <span class="footer-note">Fuerza Aérea · Léxico Operativo</span>
        <span class="page-number">${pageNum}</span>
      </div>
    `;
  }

  // Construir todas las páginas
  const pages = [];

  // PÁGINA 2: Definición + Método correcto + primeros 2 ejemplos
  pages.push(`
    <div class="page-header">
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce">
      <span class="header-title">ATC · Protocolo de Comunicaciones</span>
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce" style="opacity:0.8;">
    </div>
    <div class="page-content">
      <div class="section-title">DEFINICIÓN ATC</div>
      <div class="text-block">
        <span class="info-label">📡 AIR TRAFFIC CONTROL</span>
        <div class="info-text">
          Las comunicaciones ATC son el conjunto de sistemas y procedimientos mediante los cuales los controladores de tráfico aéreo coordinan y dirigen las aeronaves en el espacio aéreo de Fort Zancudo, garantizando despegues, aterrizajes y maniobras seguras. Su importancia radica en prevenir colisiones, organizar el flujo aéreo y mantener la seguridad operativa, especialmente en entornos con alto tráfico de aviones y helicópteros.
        </div>
      </div>

      <div class="subsection-title">MÉTODO CORRECTO</div>
      <div class="text-block">
        <div class="info-text">
          La comunicación debe responder a cuatro preguntas esenciales:
        </div>
        <div class="highlight-box">
          <strong>QUIÉN</strong> – Identificar la unidad (ej. UNIDAD).<br>
          <strong>A QUIÉN</strong> – Dirigirse a la autoridad competente (ej. ATCFZ).<br>
          <strong>DÓNDE</strong> – Ubicación exacta (H1, ZE2, ZRA, etc).<br>
          <strong>QUÉ QUIERE</strong> – Intención clara:<br>
          &nbsp;&nbsp;• <strong>Helicópteros:</strong> puesta en marcha y despegue vertical.<br>
          &nbsp;&nbsp;• <strong>Ala fija:</strong> puesta en marcha, ruta de taxeo (14E), punto de espera (PE1-3), alineación pista (30-33) y despegue.
        </div>
        <div class="info-text">
          Este método evita malentendidos, permite una gestión eficaz de secuencias y garantiza un entorno profesional.
        </div>
      </div>

      <div class="subsection-title">EJEMPLOS PRÁCTICOS</div>
      <div class="example-comm">
        <strong>Helicóptero:</strong> “UNIDAD to ATCFZ ubicado en H1 solicita autorización, puesta en marcha, posterior despegue.”
      </div>
      <div class="example-comm">
        <strong>Ala fija:</strong> “UNIDAD to ATCFZ ubicado en H1 solicita autorización, puesta en marcha, taxeo 14E, PE1, alinear pista 30, posterior despegue.”
      </div>
    </div>
    <div class="page-footer">
      <span class="footer-note">Fuerza Aérea · Control de Tráfico Aéreo</span>
      <span class="page-number">2</span>
    </div>
  `);

  // PÁGINA 3: Ejemplos adicionales (solo 3 ejemplos, sin abreviaturas)
  pages.push(`
    <div class="page-header">
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce">
      <span class="header-title">ATC · Ejemplos Adicionales</span>
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce" style="opacity:0.8;">
    </div>
    <div class="page-content">
      <div class="section-title">COMUNICACIONES EN OPERACIÓN</div>
      <div class="example-comm">
        <strong>Retorno a base:</strong> “ATCFZ, UNIDAD, solicito RT hacia AB, over.” (Regresar a Base Aérea)
      </div>
      <div class="example-comm">
        <strong>Solicitud de apoyo:</strong> “UNIDAD en GP, requiero SF, over.” (Hostil detectado en Grapeseed, solicito fuego de apoyo)
      </div>
      <div class="example-comm">
        <strong>Confirmación de misión:</strong> “KT confirmada, MC, retorno LZ, over.”
      </div>
      <div class="highlight-box" style="margin-top: 6mm;">
        <span class="info-label">📌 NOTA</span>
        <div class="info-text">Estos ejemplos reflejan la estructura QUIÉN → A QUIÉN → DÓNDE → INTENCIÓN, adaptada a situaciones tácticas.</div>
      </div>
    </div>
    <div class="page-footer">
      <span class="footer-note">Fuerza Aérea · Control de Tráfico Aéreo</span>
      <span class="page-number">3</span>
    </div>
  `);

  // Páginas 4-8: 5 páginas de abreviaturas
  pages.push(renderAbbrevPage("ABREVIATURAS · PARTE 1", abbrParts[0], 4));
  pages.push(renderAbbrevPage("ABREVIATURAS · PARTE 2", abbrParts[1], 5));
  pages.push(renderAbbrevPage("ABREVIATURAS · PARTE 3", abbrParts[2], 6));
  pages.push(renderAbbrevPage("ABREVIATURAS · PARTE 4", abbrParts[3], 7));
  pages.push(renderAbbrevPage("ABREVIATURAS · PARTE 5", abbrParts[4], 8));

  // PÁGINA 9: Alfabeto fonético y principios clave
  pages.push(`
    <div class="page-header">
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce">
      <span class="header-title">ATC · Alfabeto Fonético y Aplicación</span>
      <img src="https://i.imgur.com/GfmYqNX.png" alt="Air Force" class="logo-airforce" style="opacity:0.8;">
    </div>
    <div class="page-content">
      <div class="section-title">COMUNICACIONES CLARAS</div>
      <div class="text-block">
        <span class="info-label">🔊 ALFABETO FONÉTICO ESTÁNDAR (OTAN)</span>
        <div class="info-text">
          Alfa, Bravo, Charlie, Delta, Echo, Foxtrot, Golf, Hotel, India, Juliett, Kilo, Lima, Mike, November, Oscar, Papa, Quebec, Romeo, Sierra, Tango, Uniform, Victor, Whiskey, X-ray, Yankee, Zulu.
        </div>
      </div>
      <div class="subsection-title">EJEMPLOS COMBINADOS</div>
      <div class="example-comm">
        <strong>Identificación de posición:</strong> “UNIDAD a ATCFZ, actualmente en <strong>Hotel-1</strong>, solicitando autorización para despegue.”
      </div>
      <div class="example-comm">
        <strong>Coordenadas tácticas:</strong> “Objetivo en <strong>Sierra-7</strong>, solicitamos <strong>SF</strong>, código <strong>Kilo-Tango</strong>.”
      </div>
      <div class="example-comm">
        <strong>Emergencia:</strong> “MAYDAY, UNIDAD con <strong>MCF</strong>, requiero <strong>LZ</strong> inmediato, posición <strong>Zulu-Echo-2</strong>.”
      </div>
      <div class="highlight-box">
        <span class="info-label">✅ PRINCIPIOS CLAVE</span>
        <div class="info-text">
          • Brevedad: transmisiones cortas y al punto.<br>
          • Claridad: usar fonética cuando sea necesario.<br>
          • Disciplina: esperar turno y confirmar instrucciones.<br>
          • Estructura: siempre QUIÉN → A QUIÉN → DÓNDE → INTENCIÓN.
        </div>
      </div>
    </div>
    <div class="page-footer">
      <span class="footer-note">Fuerza Aérea · Eficiencia Operacional</span>
      <span class="page-number">9</span>
    </div>
  `);

  // PÁGINA 10: REGLA DE ORO (con lema)
  pages.push(`
    <div class="page-header">
